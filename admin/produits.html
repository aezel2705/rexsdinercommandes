<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX DINER - Gestion Produits</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="commande-header admin-header">
        <div class="header-top">
            <div class="header-user">
                <span>🦖 REX DINER</span>
                <span class="header-badge admin-badge">Admin</span>
            </div>
            <div class="header-actions">
                <a href="dashboard.html" class="header-link">📊 Dashboard</a>
                <a href="produits.html" class="header-link active-link">🍔 Produits</a>
                <a href="utilisateurs.html" class="header-link">👥 Utilisateurs</a>
                <a href="../commander.html" class="header-link">🛒 Voir le site</a>
                <button onclick="logout()" class="header-link btn-logout">🚪 Déconnexion</button>
            </div>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-section-header">
            <h1 class="page-title">🍔 Gestion des produits</h1>
            <button class="btn-ajouter-produit" id="btn-ajouter-produit">➕ Ajouter un produit</button>
        </div>

        <div class="filtres" id="filtres-categories"></div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr><th>Image</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Actif</th><th>Actions</th></tr>
                </thead>
                <tbody id="produits-liste">
                    <tr><td colspan="6" class="loading">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="detail-overlay" id="produit-overlay"></div>
    <div class="detail-modal" id="produit-modal">
        <div class="detail-header">
            <h2 id="produit-modal-titre">Ajouter un produit</h2>
            <button class="detail-fermer" id="produit-modal-fermer">✕</button>
        </div>
        <form id="produit-form" class="profil-form">
            <input type="hidden" id="produit-id">
            <div class="form-group"><label>Catégorie</label><select id="produit-categorie" required></select></div>
            <div class="form-group"><label>Nom</label><input type="text" id="produit-nom" required></div>
            <div class="form-group"><label>Description</label><input type="text" id="produit-description"></div>
            <div class="form-group"><label>Prix ($)</label><input type="number" id="produit-prix" step="0.01" min="0" required></div>
            <div class="form-group"><label>Image (chemin)</label><input type="text" id="produit-image" placeholder="ex: images/produit.png"></div>
            <div class="form-group"><label><input type="checkbox" id="produit-actif" checked> Produit actif</label></div>
            <p id="produit-error" class="error-message"></p>
            <button type="submit" class="btn-auth" id="produit-submit-btn">💾 Enregistrer</button>
            <button type="button" class="btn-supprimer-produit" id="btn-supprimer-produit" style="display:none;">🗑️ Supprimer ce produit</button>
        </form>
    </div>

    <script>
        var categories = [];
        var produits = [];
        var filtreCatId = 'toutes';

        function formatPrix(prix) { return '$' + parseFloat(prix).toFixed(2); }
        
        async function logout() { await supabase.auth.signOut(); window.location.href = '../index.html'; }

        async function checkAdmin() {
            var { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = '../index.html'; return false; }
            var { data: profile } = await supabase.from('profiles').select('role').eq('id', session.user.id).single();
            if (!profile || profile.role !== 'admin') { window.location.href = '../commander.html'; return false; }
            return true;
        }

        async function chargerCategories() {
            var { data } = await supabase.from('categories').select('*').order('ordre');
            categories = data || [];
            var filtresDiv = document.getElementById('filtres-categories');
            filtresDiv.innerHTML = '<button class="filtre-btn active" data-filtre="toutes">Toutes</button>';
            categories.forEach(function(cat) {
                filtresDiv.innerHTML += '<button class="filtre-btn" data-filtre="' + cat.id + '">' + (cat.icone || '') + ' ' + cat.nom + '</button>';
            });
            filtresDiv.querySelectorAll('.filtre-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    filtresDiv.querySelectorAll('.filtre-btn').forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    filtreCatId = this.dataset.filtre;
                    afficherProduits();
                });
            });
            var select = document.getElementById('produit-categorie');
            select.innerHTML = categories.map(function(c) { return '<option value="' + c.id + '">' + (c.icone || '') + ' ' + c.nom + '</option>'; }).join('');
        }

        async function chargerProduits() {
            var { data } = await supabase.from('produits').select('*, categories(nom)').order('ordre');
            produits = data || [];
        }

        function afficherProduits() {
            var tbody = document.getElementById('produits-liste');
            var produitsFiltres = filtreCatId === 'toutes' ? produits : produits.filter(function(p) { return p.categorie_id === parseInt(filtreCatId); });
            if (produitsFiltres.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6a6a7a;">Aucun produit</td></tr>';
                return;
            }
            tbody.innerHTML = produitsFiltres.map(function(p) {
                var imageTd = p.image ? '<img src="../' + p.image + '" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">' : '—';
                return '<tr><td>' + imageTd + '</td><td>' + p.nom + '</td><td>' + (p.categories ? p.categories.nom : '—') + '</td><td>' + formatPrix(p.prix_base) + '</td><td>' + (p.actif ? '✅' : '❌') + '</td><td><button class="btn-detail" onclick="ouvrirModaleProduit(' + p.id + ')">✏️ Modifier</button></td></tr>';
            }).join('');
        }

        document.getElementById('btn-ajouter-produit').addEventListener('click', function() {
            document.getElementById('produit-modal-titre').textContent = '➕ Ajouter un produit';
            document.getElementById('produit-id').value = '';
            document.getElementById('produit-nom').value = '';
            document.getElementById('produit-description').value = '';
            document.getElementById('produit-prix').value = '';
            document.getElementById('produit-image').value = '';
            document.getElementById('produit-actif').checked = true;
            document.getElementById('produit-error').textContent = '';
            document.getElementById('btn-supprimer-produit').style.display = 'none';
            document.getElementById('produit-submit-btn').textContent = '💾 Ajouter';
            document.getElementById('produit-overlay').classList.add('open');
            document.getElementById('produit-modal').classList.add('open');
        });

        function ouvrirModaleProduit(id) {
            var p = produits.find(function(x) { return x.id === id; });
            if (!p) return;
            document.getElementById('produit-modal-titre').textContent = '✏️ Modifier : ' + p.nom;
            document.getElementById('produit-id').value = p.id;
            document.getElementById('produit-categorie').value = p.categorie_id || '';
            document.getElementById('produit-nom').value = p.nom;
            document.getElementById('produit-description').value = p.description || '';
            document.getElementById('produit-prix').value = p.prix_base;
            document.getElementById('produit-image').value = p.image || '';
            document.getElementById('produit-actif').checked = p.actif;
            document.getElementById('produit-error').textContent = '';
            document.getElementById('btn-supprimer-produit').style.display = 'block';
            document.getElementById('produit-submit-btn').textContent = '💾 Enregistrer';
            document.getElementById('produit-overlay').classList.add('open');
            document.getElementById('produit-modal').classList.add('open');
        }

        document.getElementById('produit-modal-fermer').addEventListener('click', function() {
            document.getElementById('produit-overlay').classList.remove('open');
            document.getElementById('produit-modal').classList.remove('open');
        });

        document.getElementById('produit-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var id = document.getElementById('produit-id').value;
            var data = {
                categorie_id: parseInt(document.getElementById('produit-categorie').value) || null,
                nom: document.getElementById('produit-nom').value.trim(),
                description: document.getElementById('produit-description').value.trim(),
                prix_base: parseFloat(document.getElementById('produit-prix').value),
                image: document.getElementById('produit-image').value.trim() || null,
                actif: document.getElementById('produit-actif').checked
            };
            var error;
            if (id) {
                var result = await supabase.from('produits').update(data).eq('id', id);
                error = result.error;
            } else {
                var result = await supabase.from('produits').insert(data);
                error = result.error;
            }
            if (error) { document.getElementById('produit-error').textContent = '❌ ' + error.message; return; }
            document.getElementById('produit-overlay').classList.remove('open');
            document.getElementById('produit-modal').classList.remove('open');
            await chargerProduits();
            afficherProduits();
        });

        document.getElementById('btn-supprimer-produit').addEventListener('click', async function() {
            var id = document.getElementById('produit-id').value;
            if (!id || !confirm('Supprimer ce produit ?')) return;
            await supabase.from('produits').delete().eq('id', id);
            document.getElementById('produit-overlay').classList.remove('open');
            document.getElementById('produit-modal').classList.remove('open');
            await chargerProduits();
            afficherProduits();
        });

        async function init() {
            if (!await checkAdmin()) return;
            await chargerCategories();
            await chargerProduits();
            afficherProduits();
        }
    </script>
    <script>
    window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = '../js/supabase.js';  // ou 'js/supabase.js' selon la page
        document.body.appendChild(script);
        script.onload = function() {
            init();
        };
    });
</script>
</body>
</html>
